name: ci
on:
  push:
    branches:
      - main
    paths:
      - 'src/Neural_Network_python/**'
      - '.pre-commit-config.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'src/Neural_Network_python/**'
      - '.pre-commit-config.yaml'

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: make install-dev

      - name: Run pre-commit hooks
        run: make pre-commit

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: make install-dev

      - name: Run tests
        run: make test