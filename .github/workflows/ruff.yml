name: ci
on:
  push:
    branches:
      - main
    paths:
      - 'src/Neural_Network_python/**'
      - 'src/Simulation_Cpp/**'
      - '.pre-commit-config.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'src/Neural_Network_python/**'
      - 'src/Simulation_Cpp/**'
      - '.pre-commit-config.yaml'

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: make install-dev

      - name: Run pre-commit hooks
        run: make pre-commit
        env:
          SKIP: no-commit-to-branch

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: make install-dev

      - name: Run tests
        run: make test

  test-cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install g++-14 and libomp
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends g++-14 libomp-dev

      - name: Build and run C++ tests
        run: |
          make -C src/Simulation_Cpp/code test \
            CC=g++-14 \
            CFLAGS="-O3 -std=c++17 -march=native -Wall -g -fopenmp" \
            LDFLAGS="-fopenmp"