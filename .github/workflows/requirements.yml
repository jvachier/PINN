name: Requirements
on: 
  push:
    branches:
    - main
    paths:
    - 'src/Neural_Network_python/requirements.txt'
  pull_request:
    branches:
    - main
    paths:
    - 'src/Neural_Network_python/requirements.txt'
jobs:
  dependencies:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11"]
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        make install